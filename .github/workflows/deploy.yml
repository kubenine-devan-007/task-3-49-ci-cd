name: Deploy to ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Build Docker image (unique tag)
      - name: Build Docker image
        run: |
          docker build -t devan221/task-3-49-app:${{ github.sha }} .

      # 4. Push Docker image
      - name: Push Docker image
        run: |
          docker push devan221/task-3-49-app:${{ github.sha }}

      # 5. Configure AWS credentials (OIDC)
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::138720667646:role/task-3-49-github-actions-role
          aws-region: ap-south-1

      # 6. Register new task definition with updated image
      - name: Register new task definition
        run: |
          IMAGE=devan221/task-3-49-app:${{ github.sha }}

          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition task-3-49-task \
            --query taskDefinition)

          NEW_TASK_DEF=$(echo $TASK_DEF | jq \
            --arg IMAGE "$IMAGE" \
            '.containerDefinitions[0].image = $IMAGE
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          echo "$NEW_TASK_DEF" > new-task-def.json

          aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json

      # 7. Get latest task definition revision safely
      - name: Get latest task definition revision
        id: taskdef
        run: |
          NEW_REVISION=$(aws ecs list-task-definitions \
            --family-prefix task-3-49-task \
            --sort DESC \
            --max-items 1 \
            --query "taskDefinitionArns[0]" \
            --output text)

          echo "Latest revision: $NEW_REVISION"

          if [ -z "$NEW_REVISION" ] || [ "$NEW_REVISION" = "None" ]; then
            echo "ERROR: Failed to fetch latest task definition"
            exit 1
          fi

          echo "TASK_DEF=$NEW_REVISION" >> $GITHUB_ENV

      # 8. Update ECS service with new revision
      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster task-3-49-cluster \
            --service task-3-49-service \
            --task-definition "$TASK_DEF"