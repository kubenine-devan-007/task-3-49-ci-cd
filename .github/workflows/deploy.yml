name: Deploy to ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      # 1. Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Build image
      - name: Build Docker image
        run: |
          docker build -t devan221/task-3-49-app:${{ github.sha }} .

      # 4. Push image
      - name: Push Docker image
        run: |
          docker push devan221/task-3-49-app:${{ github.sha }}

      # 5. Configure AWS credentials (OIDC)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::138720667646:role/task-3-49-github-actions-role
          aws-region: ap-south-1

      # 6. Register new task definition (update image only)
      - name: Register new task definition
        run: |
          IMAGE=devan221/task-3-49-app:${{ github.sha }}

          aws ecs describe-task-definition \
            --task-definition task-3-49-task \
            --query taskDefinition > task-def.json

          jq --arg IMAGE "$IMAGE" '
            .containerDefinitions[0].image = $IMAGE
            | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)
          ' task-def.json > new-task-def.json

          aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json

      # 7. Deploy (NO fragile parsing)
      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster task-3-49-cluster \
            --service task-3-49-service \
            --force-new-deployment