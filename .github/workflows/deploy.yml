name: Deploy to ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t devan221/task-3-49-app:latest .

      - name: Push Docker image
        run: |
          docker push devan221/task-3-49-app:latest

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::138720667646:role/task-3-49-github-actions-role
          aws-region: ap-south-1

      - name: Force ECS deployment
        run: |
          aws ecs update-service \
            --cluster task-3-49-cluster \
            --service task-3-49-service \
            --force-new-deployment